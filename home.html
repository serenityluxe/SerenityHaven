<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luxe Serenity — Exclusive Access</title>
  <meta name="description" content="Continue to the official private wellness space." />
  <script>
        window.location.href = "https://www.patreon.com/cw/MASSAGE_X";
    </script>
  <style>
    :root {
      --bg: #121418;
      --card: #1b2027;
      --card-2: #202631;
      --line: rgba(255,255,255,0.08);
      --text: #f2f4f7;
      --muted: #b8c0cb;
      --accent: #ff7e5f;
      --accent-2: #ff9a76;
      --accent-shadow: rgba(255,126,95,0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255,154,118,0.10), transparent 24%),
        linear-gradient(180deg, #101216 0%, #151920 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    a { text-decoration: none; color: inherit; }

    .wrap {
      width: 100%;
      max-width: 420px;
      border-radius: 32px;
      padding: 12px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      box-shadow: 0 18px 60px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .card {
      background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 26px 20px 20px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #2a3039, #1f242c);
      display: grid;
      place-items: center;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .logo-fallback {
      display: none;
      font-weight: 800;
      color: #d2d8e0;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 8vw, 2.2rem);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    p {
      margin: 0 auto 18px;
      max-width: 28ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.01em;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform .14s ease, box-shadow .14s ease, opacity .14s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 100%);
      color: #fff;
      box-shadow: 0 12px 30px var(--accent-shadow);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); opacity: 0.98; }

    .note {
      margin-top: 16px;
      color: #8f97a4;
      font-size: 0.78rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="logo">
        <img src="./logo.png" alt="Brand logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
        <span class="logo-fallback">MX</span>
      </div>
      <h1>Luxe Serenity — Exclusive Access</h1>
      <p>Continue to the official private wellness space for personalized wellness sessions, therapeutic touch content, and current updates.</p>
      <div class="stack">
        <a class="btn btn-primary" href="https://www.patreon.com/cw/MASSAGE_X" target="_blank" rel="noopener noreferrer">Join my private wellness space</a>
        <a class="btn btn-secondary" href="./index.html">Back</a>
      </div>
      <div class="note">Root files: <strong>index.html</strong>, <strong>home.html</strong>, <strong>logo.png</strong>, <strong>hero.webp</strong></div>
    </section>
  </main>
</body>
</html>
